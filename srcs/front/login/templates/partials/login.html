<!-- Load boilerplate -->
{% extends "../base.html" %}    

<!-- Set title -->
{% block title %}Login{% endblock %}

<!-- Load local files -->
{% load static %}

<!-- Local stylesheets -->
{% block styles %}
        <link rel="stylesheet"
	      href="{% static 'css/login.css' %}" />
{% endblock %}

<!-- Main content -->
{% block content %}
        <div class="d-flex row justify-content-center align-content-center">
            <div class="LoginBox col-sm-10 col-md-6 col-lg-4">
		    {% csrf_token %}
	    </div>
	</div>
{% endblock %}

<!-- Local javascript -->
{% block js %}
<!--    Commented bc I dont want it to redirect to home    
	<script src="{% static 'js/spa.js' %}"></script>
-->
{% endblock %}
